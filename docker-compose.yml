services:
  mysql:
    image: mysql:8.0
    container_name: fund-next-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: fund_next
      MYSQL_USER: fund_user
      MYSQL_PASSWORD: fund_pass_2024
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fund-next-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://fund_user:fund_pass_2024@mysql:3306/fund_next
      JWT_ACCESS_SECRET: docker-dev-access-secret-key-2024
      JWT_REFRESH_SECRET: docker-dev-refresh-secret-key-2024
      MARKET_DATA_PROVIDER: mock
    depends_on:
      mysql:
        condition: service_healthy
    profiles:
      - full

volumes:
  mysql_data:
